apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-default
  namespace: devops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: react-default
  template:
    metadata:
      labels:
        app: react-default
    spec:
      containers:
        - name: react-default
          image: react-default:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: react-default
  namespace: devops
spec:
  selector:
    app: react-default
  ports:
    - port: 80
      targetPort: 80
  type: NodePort
